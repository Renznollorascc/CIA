<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST-TRACE // CLASSIFIED</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="css/index.css">

    <style>
        :root {
            --term-green: #0f3;
            --term-bg: #050505;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- THE LOCK SCREEN --- */
        #gatekeeper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background: var(--term-bg);
            text-align: center;
        }
        .glitch {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 5px var(--term-green);
        }
        #passphrase-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: inherit;
            font-size: 1.5rem;
            text-align: center;
            padding: 5px;
            margin-top: 20px;
            outline: none;
            letter-spacing: 2px;
        }
        #passphrase-input:focus {
            box-shadow: 0px 5px 5px -5px var(--term-green);
        }
        #error-log {
            color: red;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 0 5px red;
        }

        /* --- THE MAP (Hidden by default) --- */
        #map-container {
            width: 100vw;
            height: 100vh;
            display: none; /* Stays hidden until password is correct */
        }
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }
        .btn-drop {
            background: var(--term-green);
            color: black;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px var(--term-green);
        }
        .btn-drop:hover {
            background: white;
            box-shadow: 0 0 15px white;
        }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="glitch">SECURE CONNECTION ESTABLISHED</div>
        <p>AWAITING AUTHORIZATION PROTOCOL...</p>
        
        <input type="password" id="passphrase-input" autocomplete="off" autofocus placeholder="ENTER KEY">
        
        <div id="error-log">[!] ACCESS DENIED. TRACE INITIATED.</div>
    </div>

    <div id="map-container">
        </div>

    <div id="ui-layer">
        <button class="btn-drop" id="btn-initiate">[ INITIATE DEAD DROP ]</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const gatekeeper = document.getElementById('gatekeeper');
        const mapContainer = document.getElementById('map-container');
        const uiLayer = document.getElementById('ui-layer');
        const input = document.getElementById('passphrase-input');
        const errorLog = document.getElementById('error-log');

        // Listen for the "Enter" key
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (this.value === 'theresnogod') {
                    // CORRECT PASSWORD: Hide gatekeeper, show map
                    gatekeeper.style.display = 'none';
                    mapContainer.style.display = 'block';
                    uiLayer.style.display = 'block';
                    
                    // Dispatch a custom event telling map.js to wake up
                    window.dispatchEvent(new Event('systemUnlocked'));
                } else {
                    // WRONG PASSWORD: Flash error, clear input
                    errorLog.style.opacity = '1';
                    this.value = '';
                    setTimeout(() => errorLog.style.opacity = '0', 2000);
                }
            }
        });
        
        <script src="js/map.js"></script>
    </script>

    </body>
</html>
