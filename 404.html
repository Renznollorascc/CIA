<!DOCTYPE html>
<html lang="en">
<head>

    <title>Page Not Found | My Website</title>
    <link rel="stylesheet" href="/style.css"> 
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            background-color: #f8f9fa;
            color: #333;

        h1 {
